<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDG Field Operations Dashboard — MBR Texas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3e;
    --accent: #4f8ef7;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --header-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  /* ── Header ── */
  header {
    height: var(--header-h); background: var(--card); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: .4px; }
  header h1 span { color: var(--accent); }
  #refresh-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 6px 14px; cursor: pointer; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  #refresh-btn:hover { opacity: .85; }
  #last-updated { color: var(--muted); font-size: 12px; }

  /* ── Layout ── */
  main { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; max-width: 1400px; margin: 0 auto; }

  /* ── KPI Strip ── */
  #kpi-strip { display: flex; gap: 14px; flex-wrap: wrap; }
  .kpi-card {
    flex: 1 1 140px; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 6px;
  }
  .kpi-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
  .kpi-card .value { font-size: 28px; font-weight: 700; }
  .kpi-card .sub { font-size: 11px; color: var(--muted); }
  .kpi-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 6px; }
  .kpi-bar-fill { height: 4px; border-radius: 2px; }

  /* ── Row of charts ── */
  .chart-row { display: grid; gap: 14px; }
  .chart-row.two-col { grid-template-columns: 1fr 1fr; }
  .chart-row.three-col { grid-template-columns: 1fr 1fr 1fr; }

  .chart-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px;
  }
  .chart-card h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }
  .chart-wrap { position: relative; }
  .chart-wrap canvas { width: 100% !important; }

  /* ── Attendance table ── */
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; padding: 8px 12px; color: var(--muted);
    font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
  }
  tbody tr:hover { background: rgba(79,142,247,.06); }
  tbody td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .badge-am { background: rgba(79,142,247,.18); color: #7db4ff; }
  .badge-pm { background: rgba(245,158,11,.18); color: #fbbf24; }
  .pct-pill {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }

  /* ── Matrix table ── */
  .matrix-wrap { overflow-x: auto; }
  .matrix-table { border-collapse: collapse; font-size: 12px; min-width: 600px; }
  .matrix-table th, .matrix-table td { padding: 7px 12px; border: 1px solid var(--border); }
  .matrix-table thead th { background: rgba(79,142,247,.12); color: var(--accent); font-weight: 700; text-align: center; }
  .matrix-table .row-header { color: var(--text); font-weight: 600; white-space: nowrap; }
  .matrix-cell { text-align: center; font-weight: 700; }

  /* ── Loading / error ── */
  #loading { text-align: center; padding: 60px; color: var(--muted); font-size: 15px; }
  #error-msg { background: rgba(239,68,68,.12); border: 1px solid var(--red); color: #fca5a5;
    border-radius: 8px; padding: 14px 18px; display: none; }

  @media (max-width: 768px) {
    .chart-row.two-col, .chart-row.three-col { grid-template-columns: 1fr; }
    #kpi-strip .kpi-card { flex: 1 1 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>TDG Field Operations &mdash; <span>MBR Texas</span></h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <span id="last-updated"></span>
    <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<main>
  <div id="error-msg"></div>
  <div id="loading">Loading dashboard data…</div>

  <!-- KPI strip -->
  <div id="kpi-strip" style="display:none"></div>

  <!-- Charts row 1: main_trade + individual trade -->
  <div class="chart-row two-col" id="row1" style="display:none">
    <div class="chart-card">
      <h2>Progress by Main Trade</h2>
      <div class="chart-wrap" style="height:220px"><canvas id="chart-main-trade"></canvas></div>
    </div>
    <div class="chart-card">
      <h2>Progress by Individual Trade</h2>
      <div class="chart-wrap" style="height:220px"><canvas id="chart-trade"></canvas></div>
    </div>
  </div>

  <!-- Charts row 2: line chart + matrix -->
  <div class="chart-row two-col" id="row2" style="display:none">
    <div class="chart-card">
      <h2>Day-by-Day History</h2>
      <div class="chart-wrap" style="height:220px"><canvas id="chart-history"></canvas></div>
    </div>
    <div class="chart-card">
      <h2>Unit × Trade Matrix</h2>
      <div class="matrix-wrap"><div id="matrix-container"></div></div>
    </div>
  </div>

  <!-- Attendance log -->
  <div class="chart-card" id="row3" style="display:none">
    <h2>Attendance Log</h2>
    <div class="table-scroll"><table id="attendance-table">
      <thead><tr>
        <th>Date</th><th>Unit</th><th>Shift</th><th>Trade</th><th>Progress</th><th>Crew</th><th>Notes</th>
      </tr></thead>
      <tbody id="attendance-body"></tbody>
    </table></div>
  </div>
</main>

<script>
const COLORS = [
  '#4f8ef7','#22c55e','#f59e0b','#ef4444','#a78bfa','#34d399',
  '#fb923c','#38bdf8','#f472b6','#84cc16','#e879f9','#2dd4bf'
];

let charts = {};

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function pctColor(v) {
  if (v === null || v === undefined) return '#64748b';
  if (v >= 0.9) return '#22c55e';
  if (v >= 0.5) return '#f59e0b';
  return '#ef4444';
}

function fmtPct(v) {
  if (v === null || v === undefined) return '—';
  return (v * 100).toFixed(0) + '%';
}

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
  ['kpi-strip','row1','row2','row3'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });

  try {
    const res = await fetch('/api/data');
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const d = await res.json();
    render(d);
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    const el = document.getElementById('error-msg');
    el.textContent = 'Could not load data: ' + e.message;
    el.style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

function render(d) {
  renderKPI(d.unit_progress);
  renderMainTrade(d.main_trade_pct);
  renderTrade(d.unit_trade_pct);
  renderHistory(d.records);
  renderMatrix(d.unit_trade_pct);
  renderAttendance(d.records);

  ['kpi-strip','row1','row2','row3'].forEach(id => {
    document.getElementById(id).style.display = '';
  });
  document.getElementById('row1').style.display = 'grid';
  document.getElementById('row2').style.display = 'grid';
}

/* ── KPI Cards ── */
function renderKPI(unitProgress) {
  const strip = document.getElementById('kpi-strip');
  strip.innerHTML = '';

  const units = Object.keys(unitProgress).sort();
  if (!units.length) {
    strip.innerHTML = '<p style="color:var(--muted)">No unit data yet.</p>';
    return;
  }

  // Overall card
  const overall = units.reduce((s, u) => s + unitProgress[u], 0) / units.length;
  strip.appendChild(makeKPI('Overall Progress', overall, `${units.length} units tracked`));

  units.forEach(u => {
    strip.appendChild(makeKPI(`Unit ${u}`, unitProgress[u], 'avg of latest trades'));
  });
}

function makeKPI(label, value, sub) {
  const pct = value * 100;
  const color = pctColor(value);
  const card = document.createElement('div');
  card.className = 'kpi-card';
  card.innerHTML = `
    <div class="label">${label}</div>
    <div class="value" style="color:${color}">${fmtPct(value)}</div>
    <div class="sub">${sub}</div>
    <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${pct}%;background:${color}"></div></div>
  `;
  return card;
}

/* ── Main Trade Bar Chart ── */
function renderMainTrade(mainTradePct) {
  destroyChart('main-trade');
  const labels = Object.keys(mainTradePct).sort();
  const values = labels.map(k => +(mainTradePct[k] * 100).toFixed(1));

  charts['main-trade'] = new Chart(document.getElementById('chart-main-trade'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: labels.map((_, i) => COLORS[i % COLORS.length] + 'cc'),
        borderColor: labels.map((_, i) => COLORS[i % COLORS.length]),
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.raw.toFixed(1) + '%' } }
      },
      scales: {
        x: { min: 0, max: 100, ticks: { color: '#64748b', callback: v => v + '%' }, grid: { color: '#2a2d3e' } },
        y: { ticks: { color: '#e2e8f0', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
}

/* ── Individual Trade Bar Chart ── */
function renderTrade(unitTradePct) {
  destroyChart('trade');
  // Flatten all (trade, latest_pct) — average across units
  const tradeMap = {};
  Object.values(unitTradePct).forEach(trades => {
    Object.entries(trades).forEach(([trade, pct]) => {
      if (!tradeMap[trade]) tradeMap[trade] = [];
      tradeMap[trade].push(pct);
    });
  });
  const labels = Object.keys(tradeMap).sort();
  const values = labels.map(k => +(tradeMap[k].reduce((a,b)=>a+b,0)/tradeMap[k].length*100).toFixed(1));

  charts['trade'] = new Chart(document.getElementById('chart-trade'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: labels.map((_, i) => COLORS[i % COLORS.length] + 'bb'),
        borderColor: labels.map((_, i) => COLORS[i % COLORS.length]),
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.raw.toFixed(1) + '%' } }
      },
      scales: {
        x: { min: 0, max: 100, ticks: { color: '#64748b', callback: v => v + '%' }, grid: { color: '#2a2d3e' } },
        y: { ticks: { color: '#e2e8f0', font: { size: 10 } }, grid: { display: false } }
      }
    }
  });
}

/* ── Day-by-Day Line Chart ── */
function renderHistory(records) {
  destroyChart('history');

  // Group by date + area_phase → average progress_pct
  const byDateTrade = {};
  const allTrades = new Set();
  const allDates = new Set();

  records.forEach(r => {
    if (r.progress_pct === null || r.progress_pct === undefined) return;
    const key = r.date + '|' + r.area_phase;
    if (!byDateTrade[key]) byDateTrade[key] = [];
    byDateTrade[key].push(r.progress_pct);
    allTrades.add(r.area_phase);
    allDates.add(r.date);
  });

  const dates = [...allDates].sort();
  const trades = [...allTrades].sort();

  const datasets = trades.map((trade, i) => ({
    label: trade,
    data: dates.map(date => {
      const k = date + '|' + trade;
      if (!byDateTrade[k]) return null;
      const vals = byDateTrade[k];
      return +(vals.reduce((a,b)=>a+b,0)/vals.length * 100).toFixed(1);
    }),
    borderColor: COLORS[i % COLORS.length],
    backgroundColor: COLORS[i % COLORS.length] + '22',
    tension: 0.3,
    pointRadius: 4,
    spanGaps: true,
  }));

  charts['history'] = new Chart(document.getElementById('chart-history'), {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { size: 10 }, boxWidth: 12 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.raw}%` } }
      },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 11 } }, grid: { color: '#2a2d3e' } },
        y: { min: 0, max: 100, ticks: { color: '#64748b', callback: v => v + '%' }, grid: { color: '#2a2d3e' } }
      }
    }
  });
}

/* ── Unit × Trade Matrix ── */
function renderMatrix(unitTradePct) {
  const units = Object.keys(unitTradePct).sort();
  if (!units.length) { document.getElementById('matrix-container').innerHTML = '<p style="color:var(--muted)">No data.</p>'; return; }

  // All trades across all units
  const tradeSet = new Set();
  units.forEach(u => Object.keys(unitTradePct[u]).forEach(t => tradeSet.add(t)));
  const trades = [...tradeSet].sort();

  let html = '<table class="matrix-table"><thead><tr><th>Unit</th>';
  trades.forEach(t => {
    const short = t.length > 22 ? t.slice(0, 20) + '…' : t;
    html += `<th title="${t}">${short}</th>`;
  });
  html += '</tr></thead><tbody>';

  units.forEach(u => {
    html += `<tr><td class="row-header">${u}</td>`;
    trades.forEach(t => {
      const v = unitTradePct[u][t];
      if (v === undefined) {
        html += '<td class="matrix-cell" style="color:var(--muted)">—</td>';
      } else {
        const color = pctColor(v);
        html += `<td class="matrix-cell pct-pill" style="color:${color}">${fmtPct(v)}</td>`;
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('matrix-container').innerHTML = html;
}

/* ── Attendance Log ── */
function renderAttendance(records) {
  const body = document.getElementById('attendance-body');
  const sorted = [...records].sort((a,b) => {
    if (a.date < b.date) return 1;
    if (a.date > b.date) return -1;
    return 0;
  });
  body.innerHTML = sorted.slice(0, 200).map(r => {
    const v = r.progress_pct;
    const pctDisplay = v !== null && v !== undefined
      ? `<span class="pct-pill" style="background:${pctColor(v)}22;color:${pctColor(v)}">${fmtPct(v)}</span>`
      : '—';
    const shiftBadge = r.period === 'AM'
      ? `<span class="badge badge-am">AM</span>`
      : `<span class="badge badge-pm">PM</span>`;
    return `<tr>
      <td>${r.date}</td>
      <td><strong>${r.position || '—'}</strong></td>
      <td>${shiftBadge}</td>
      <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${r.area_phase||''}">${r.area_phase || '—'}</td>
      <td>${pctDisplay}</td>
      <td>${r.crew || '—'}</td>
      <td style="color:var(--muted);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.notes || ''}</td>
    </tr>`;
  }).join('');
}

// Load on page open
loadData();
</script>
</body>
</html>
