<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TDG — Daily Update</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f1923;
  color: #e8edf2;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ── */
.top-bar {
  background: #162030;
  border-bottom: 2px solid #1e2d3d;
  padding: 10px 14px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.logo {
  width: 34px; height: 34px;
  background: #1a6bc4; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 11px; color: white; flex-shrink: 0;
}

.ctrl-group { display: flex; align-items: center; gap: 6px; }

.ctrl-label {
  font-size: 10px; font-weight: 600; color: #6b7f94;
  text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap;
}

select.ctrl, input.ctrl {
  background: #0f1923; border: 1px solid #2a3d52;
  border-radius: 6px; color: #e8edf2;
  font-size: 14px; padding: 6px 10px;
  outline: none; -webkit-appearance: none; height: 34px;
}
select.ctrl:focus, input.ctrl:focus { border-color: #1a6bc4; }

.period-row { display: flex; gap: 4px; }
.period-btn {
  height: 34px; padding: 0 14px;
  border: 1px solid #2a3d52; border-radius: 6px;
  background: #0f1923; color: #6b7f94;
  font-size: 13px; font-weight: 700; cursor: pointer;
}
.period-btn.active { background: #1a3a5c; border-color: #1a6bc4; color: #4da3ff; }

.submit-btn {
  margin-left: auto; height: 34px; padding: 0 20px;
  background: #1a6bc4; border: none; border-radius: 7px;
  color: white; font-size: 14px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}
.submit-btn:active { background: #1558a0; }
.submit-btn:disabled { background: #1e2d3d; color: #4a5568; cursor: not-allowed; }

/* ── Scrollable table container ── */
.table-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  min-width: 540px;
  border-collapse: collapse;
  table-layout: fixed;
}

col.c-trade { width: 210px; }
col.c-pct   { width: 78px; }
col.c-resp  { width: 140px; }
col.c-notes { min-width: 180px; }

/* Frozen header — sticky at top of scroll container */
thead th {
  background: #0d1520;
  color: #4a6380;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  padding: 9px 8px;
  border-bottom: 2px solid #1e2d3d;
  white-space: nowrap; text-align: left;
  position: sticky; top: 0; z-index: 20;
}
thead th:first-child {
  position: sticky; left: 0; top: 0; z-index: 30;
  background: #0d1520;
}

/* Category rows */
tr.cat-row td {
  background: #111d2b; color: #1a6bc4;
  font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px;
  padding: 7px 10px;
  border-top: 2px solid #1e2d3d;
  border-bottom: 1px solid #1e2d3d;
}
tr.cat-row td:first-child {
  position: sticky; left: 0; z-index: 5;
  background: #111d2b;
}

/* Trade rows */
tr.trade-row td {
  padding: 3px 6px;
  border-bottom: 1px solid #131f2d;
  vertical-align: middle;
  background: #0f1923;
}
tr.trade-row:hover td { background: #132030; }

tr.trade-row td:first-child {
  position: sticky; left: 0; z-index: 4;
  background: #0f1923;
  font-size: 12px; color: #8fa3b5;
  padding-left: 18px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
tr.trade-row:hover td:first-child { background: #132030; }

tr.trade-row.has-data td             { background: #0e1d2e; }
tr.trade-row.has-data td:first-child { background: #0e1d2e; color: #e8edf2; }

/* Inputs */
input.t-pct {
  width: 60px;
  background: #0a1420; border: 1px solid #1e2d3d;
  border-radius: 5px; color: #e8edf2;
  font-size: 13px; font-weight: 600;
  padding: 4px 6px; text-align: center; outline: none;
}
input.t-pct:focus { border-color: #1a6bc4; }
input.t-pct.prefilled { color: #6baed6; border-color: #1e3a52; }

input.t-text {
  width: 100%;
  background: #0a1420; border: 1px solid #1e2d3d;
  border-radius: 5px; color: #e8edf2;
  font-size: 12px; padding: 4px 7px;
  outline: none; height: 28px;
}
input.t-text:focus { border-color: #1a6bc4; }

/* Status bar */
.status-bar {
  flex-shrink: 0;
  text-align: center; padding: 8px 16px;
  font-size: 11px; color: #3d5470;
  border-top: 1px solid #131f2d;
  background: #0f1923;
}

/* Loading overlay */
.loading {
  display: none;
  position: absolute; inset: 0;
  background: rgba(15,25,35,0.6);
  align-items: center; justify-content: center;
  font-size: 13px; color: #4da3ff;
  z-index: 50;
}
.loading.show { display: flex; }

/* Toast */
.toast {
  display: none;
  position: fixed; top: 70px; left: 50%;
  transform: translateX(-50%);
  background: #16a34a; color: white;
  padding: 11px 24px; border-radius: 100px;
  font-size: 13px; font-weight: 700;
  z-index: 999; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.toast.error { background: #dc2626; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">TDG</div>

  <div class="ctrl-group">
    <span class="ctrl-label">Unit</span>
    <select class="ctrl" id="unit" style="width:82px" onchange="loadPrevious()">
      <option value="">—</option>
      <optgroup label="A Series">
        <option>01A</option><option>02A</option><option>03A</option>
        <option>04A</option><option>05A</option><option>06A</option>
        <option>07A</option><option>08A</option><option>09A</option>
      </optgroup>
      <optgroup label="B Series">
        <option>01B</option><option>02B</option><option>03B</option>
        <option>04B</option><option>05B</option><option>06B</option>
        <option>07B</option><option>08B</option><option>09B</option>
        <option>10B</option><option>11B</option><option>12B</option>
        <option>13B</option><option>14B</option><option>15B</option>
        <option>16B</option><option>17B</option><option>18B</option>
        <option>19B</option><option>20B</option><option>21B</option>
        <option>22B</option><option>23B</option><option>24B</option>
        <option>25B</option><option>26B</option><option>27B</option>
        <option>28B</option>
      </optgroup>
    </select>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Date</span>
    <input type="date" class="ctrl" id="date" value="{{ today }}" style="width:142px">
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Shift</span>
    <div class="period-row">
      <button class="period-btn active" data-val="AM" onclick="setPeriod(this)">AM</button>
      <button class="period-btn"        data-val="PM" onclick="setPeriod(this)">PM</button>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitAll()">Submit Update</button>
</div>

<div class="table-wrap" id="tableWrap">
  <div class="loading" id="loading">Loading previous data…</div>
  <table>
    <colgroup>
      <col class="c-trade">
      <col class="c-pct">
      <col class="c-resp">
      <col class="c-notes">
    </colgroup>
    <thead>
      <tr>
        <th>Trade / Activity</th>
        <th style="text-align:center">% Done</th>
        <th>Responsible</th>
        <th>Notes / Flags</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="status-bar" id="statusBar">Select a unit to load previous progress, fill active trades, then Submit.</div>
<div class="toast" id="toast"></div>

<script>
const TRADES = [
  { cat: '1. Structure', subs: [
    'C Channel / Holes Templates',
    'Weld 4 I beams (10" I beams)',
    'C Channels 12" weld to enclose frame',
    'Square the frame',
    'Inside C Channels/Square',
    'Nuts inside C Channel',
    'Floor plate (Pull, Cut, Weld)',
    'Square tube Halo (Pull, Cut, Grind, Weld)',
    'I beam on halo stand up Posts',
    'Square halo and weld to post',
    'Square tubes for doors',
    'Ground plates',
    'Weld floor plates together'
  ]},
  { cat: '2. Structure Paint', subs: [] },
  { cat: '3. Envelope',        subs: [] },
  { cat: '4. Unit Paint',      subs: [] },
  { cat: '5. Internal Systems Rough-In', subs: [] },
  { cat: 'ELECTRICAL', subs: [
    'Ground Bar', 'Wall/Ceiling Boxes & Conduit',
    'H2 Control Box & Conduit', 'HVAC Control Box & Conduit',
    'Exhaust Fan Control Box & Conduit', 'PLC & Conduit', 'Wall/Ceiling Conduit'
  ]},
  { cat: 'BATTERY CABINETS', subs: [
    'Unload from truck','Unpack units','Unpalletize units',
    'Position units in place','Uninstall plates','Install Pucks',
    'Put in covers','Fans','KO Plates','Cover w/ Drop Cloth'
  ]},
  { cat: 'IOs/POWER CABINETS', subs: [
    'Unload from truck','Unpack units','Unpalletize units',
    'Position units in place','Uninstall plates','Install Bars',
    'Put in covers','KO Plates','Cover w/ Drop Cloth'
  ]},
  { cat: 'SWITCH GEAR', subs: [
    'Bus Bar','ATS Plate @ SwGr #2 to #3','Top Hats','KO Plates','2" EMT @ SwGr #4'
  ]},
  { cat: 'PANELS & CABLE', subs: [
    'Panels/Transformers & Conduit','Cable Tray Supports (Struts)',
    '24" Cable Tray','30" Cable Tray','24" Step Down Tray',
    'Battery to Battery Conduit','Batt to SwGr #4 Comm Conduit',
    '18" Battery Tray','Battery Cabinet Conduit'
  ]},
  { cat: 'BATTERY CONNECTIONS', subs: [
    'Battery to Battery','Battery to SwGr #4','18" Battery Tray'
  ]},
  { cat: 'IO CONDUIT', subs: ['IO to IO','IO to Batteries','IO to SwGr #4'] },
  { cat: 'LIGHTING',   subs: ['Lighting & Conduit'] },
  { cat: 'CLOSEOUT',   subs: [
    'Cut Down All Thread','Cap All Thread','Caulk Screw Holes',
    'Clean Up','Final Walk Through','Check All Boxes for Bushings',
    'Check Conduit/Unistrut/All Thread Level & Plumb'
  ]},
  { cat: '6. Electrical',     subs: [] },
  { cat: '7. Final QC',       subs: [] },
  { cat: '8. Final Touchups', subs: [] }
];

let selectedPeriod = 'AM';

function setPeriod(btn) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedPeriod = btn.dataset.val;
}

function buildTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  TRADES.forEach(group => {
    const catTr = document.createElement('tr');
    catTr.className = 'cat-row';
    catTr.innerHTML = `<td colspan="4">${group.cat}</td>`;
    tbody.appendChild(catTr);

    const catOnly = group.subs.length === 0;
    const rows    = catOnly ? [''] : group.subs;

    rows.forEach(sub => {
      const tradeKey = catOnly ? group.cat : `${group.cat} > ${sub}`;
      const tr = document.createElement('tr');
      tr.className     = 'trade-row';
      tr.dataset.trade = tradeKey;
      tr.innerHTML = `
        <td title="${sub}">${sub}</td>
        <td style="text-align:center">
          <input class="t-pct" type="number" min="0" max="100"
                 placeholder="—" data-field="pct" oninput="markRow(this)">
        </td>
        <td><input class="t-text" type="text" placeholder="Name…"
                   data-field="resp" oninput="markRow(this)"></td>
        <td><input class="t-text" type="text" placeholder="Notes…"
                   data-field="notes" oninput="markRow(this)"></td>
      `;
      tbody.appendChild(tr);
    });
  });
}

function markRow(el) {
  const tr   = el.closest('tr');
  const vals = [...tr.querySelectorAll('[data-field]')].map(i => i.value).join('');
  tr.classList.toggle('has-data', vals.trim() !== '');
}

async function loadPrevious() {
  const unit = document.getElementById('unit').value;

  // Clear all inputs first
  document.querySelectorAll('tr.trade-row input').forEach(el => {
    el.value = '';
    el.classList.remove('prefilled');
  });
  document.querySelectorAll('tr.trade-row').forEach(tr => tr.classList.remove('has-data'));
  document.getElementById('statusBar').textContent = 'Loading previous data…';

  if (!unit) {
    document.getElementById('statusBar').textContent = 'Select a unit to load previous progress.';
    return;
  }

  document.getElementById('loading').classList.add('show');

  try {
    const res  = await fetch(`/unit-progress/${unit}`);
    const data = await res.json();

    let filled = 0;
    document.querySelectorAll('tr.trade-row').forEach(tr => {
      const key      = tr.dataset.trade;
      const pctInput = tr.querySelector('[data-field="pct"]');
      if (data[key] !== undefined && data[key] !== null) {
        const pct = Math.round(data[key] * 100);
        pctInput.value = pct;
        pctInput.classList.add('prefilled');
        tr.classList.add('has-data');
        filled++;
      }
    });

    document.getElementById('statusBar').textContent =
      filled > 0
        ? `${unit} — ${filled} trades pre-loaded from last entry. Update and submit.`
        : `${unit} — no previous data found. Fill in today's progress and submit.`;
  } catch(e) {
    document.getElementById('statusBar').textContent = 'Could not load previous data.';
  }

  document.getElementById('loading').classList.remove('show');
}

async function submitAll() {
  const unit = document.getElementById('unit').value;
  const date = document.getElementById('date').value;
  if (!unit) { showToast('Select a unit first', true); return; }
  if (!date) { showToast('Date is required', true);   return; }

  const entries = [];
  document.querySelectorAll('tr.trade-row').forEach(tr => {
    const pct  = tr.querySelector('[data-field="pct"]').value.trim();
    const resp = tr.querySelector('[data-field="resp"]').value.trim();
    const note = tr.querySelector('[data-field="notes"]').value.trim();
    if (pct || resp || note) {
      entries.push({
        date, period: selectedPeriod, position: unit,
        trade:        tr.dataset.trade,
        progress_pct: pct !== '' ? parseFloat(pct) : null,
        responsible:  resp,
        notes:        note
      });
    }
  });

  if (!entries.length) { showToast('No rows filled — nothing to save', true); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled    = true;
  btn.textContent = `Saving ${entries.length}…`;

  try {
    const res  = await fetch('/submit-batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(entries)
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`✓ ${data.saved} trades saved`);
      // Remove prefilled highlight — new values are now the current state
      document.querySelectorAll('input.t-pct').forEach(el => el.classList.remove('prefilled'));
      document.getElementById('statusBar').textContent =
        `Saved: ${unit} ${selectedPeriod} ${date} — ${data.saved} trades recorded`;
    } else {
      showToast(`Error: ${(data.errors||['Unknown'])[0].slice(0,80)}`, true);
    }
  } catch(e) {
    showToast('Connection error', true);
  }

  btn.disabled    = false;
  btn.textContent = 'Submit Update';
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent   = msg;
  t.className     = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3500);
}

buildTable();
</script>
</body>
</html>
