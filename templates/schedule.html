<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipping Schedule — MBR Texas</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:#0f172a;min-height:100vh;}
header{background:#0f1117;border-bottom:1px solid #1e2533;padding:14px 20px;display:flex;align-items:center;gap:12px;}
.logo-badge{width:38px;height:38px;background:linear-gradient(135deg,#1a6bc4,#4f8ef7);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0;}
.header-text h1{font-size:15px;font-weight:700;color:#e2e8f0;}
.header-text p{font-size:11px;color:#64748b;margin-top:1px;}
.back-btn{margin-left:auto;background:#1a1d27;border:1px solid #2a2d3e;border-radius:8px;color:#94a3b8;padding:6px 12px;font-size:12px;cursor:pointer;text-decoration:none;font-weight:600;transition:.15s;flex-shrink:0;}
.back-btn:hover{border-color:#4f8ef7;color:#e2e8f0;}
.container{max-width:740px;margin:0 auto;padding:20px 16px 80px;}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.month-label{font-size:18px;font-weight:800;color:#0f172a;letter-spacing:-.3px;}
.nav-btn{background:#fff;border:1px solid #cbd5e1;border-radius:8px;color:#475569;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.nav-btn:hover{border-color:#1a6bc4;color:#1a6bc4;}
.cal-grid{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.cal-days-hdr{display:grid;grid-template-columns:repeat(7,1fr);background:#f8fafc;border-bottom:1px solid #e2e8f0;}
.cal-day-hdr{text-align:center;padding:9px 0;font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:.7px;text-transform:uppercase;}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:82px;padding:6px 5px 0;border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;cursor:default;position:relative;overflow:hidden;background:#fff;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.empty{background:#fafbfc;}
.cal-cell.has-event{cursor:pointer;}
.cal-cell.has-event:hover{background:#f0f7ff;}
.cal-cell.today .day-num{background:#1a6bc4;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:800;}
.day-num{font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-cell.has-event .day-num{color:#334155;}
.range-seg{position:absolute;bottom:0;height:5px;}
.range-seg.seg-start{left:50%;right:0;}
.range-seg.seg-mid{left:0;right:0;}
.range-seg.seg-end{left:0;right:50%;}
.range-seg.seg-single{left:10%;right:10%;border-radius:3px;}
.seg-h3{background:#a855f7;}
.seg-h4{background:#2563eb;}
.seg-shipped{background:#16a34a;}
.event-pill{font-size:9px;font-weight:700;border-radius:5px;padding:2px 5px;margin-bottom:2px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.pill-h3{background:#f3e8ff;color:#7e22ce;border-left:2px solid #a855f7;}
.pill-h4{background:#dbeafe;color:#1d4ed8;border-left:2px solid #2563eb;}
.pill-shipped{background:#dcfce7;color:#15803d;border-left:2px solid #16a34a;}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#64748b;font-weight:600;}
.legend-dot{width:12px;height:5px;border-radius:3px;}
.ld-h3{background:#a855f7;}
.ld-h4{background:#2563eb;}
.ld-shipped{background:#16a34a;}
.detail-panel{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-top:14px;display:none;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.detail-panel.open{display:block;}
.detail-date{font-size:11px;font-weight:700;color:#1a6bc4;margin-bottom:12px;text-transform:uppercase;letter-spacing:.6px;}
.detail-item{background:#f8fafc;border-radius:8px;padding:11px 13px;margin-bottom:8px;border-left:3px solid #2563eb;}
.detail-item.h3{border-left-color:#a855f7;}
.detail-item.shipped{border-left-color:#16a34a;}
.detail-project{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.detail-name{font-size:13px;font-weight:700;color:#0f172a;margin-bottom:3px;}
.detail-meta{font-size:11px;color:#64748b;}
.detail-range{font-size:10px;color:#94a3b8;margin-top:4px;}
.detail-status{font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;display:inline-block;margin-top:6px;}
.status-shipped{background:#dcfce7;color:#15803d;}
.status-upcoming{background:#dbeafe;color:#1d4ed8;}
.status-thisweek{background:#fef9c3;color:#a16207;}
.notify-btn{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid #cbd5e1;border-radius:9px;color:#475569;font-size:12px;font-weight:700;padding:8px 14px;cursor:pointer;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.notify-btn:hover{border-color:#1a6bc4;color:#1a6bc4;}
#notifyMsg{font-size:11px;color:#15803d;margin-left:4px;display:none;font-weight:600;}
.section-label{font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:.8px;text-transform:uppercase;margin:22px 0 10px;}
.upcoming-item{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:13px;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.upcoming-item:hover{border-color:#bfdbfe;box-shadow:0 2px 8px rgba(37,99,235,.08);}
.upcoming-date-box{background:#f0f7ff;border-radius:8px;padding:6px 10px;text-align:center;min-width:52px;flex-shrink:0;border:1px solid #dbeafe;}
.udb-month{font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px;}
.udb-day{font-size:20px;font-weight:800;line-height:1.1;}
.upcoming-info{flex:1;min-width:0;}
.upcoming-project{font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:.4px;}
.upcoming-name{font-size:13px;font-weight:700;color:#0f172a;margin:2px 0;}
.upcoming-units{font-size:11px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.upcoming-range{font-size:10px;color:#94a3b8;margin-top:3px;}
.upcoming-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;flex-shrink:0;}
@media(max-width:520px){
  .cal-cell{min-height:62px;padding:4px 3px 0;}
  .event-pill{font-size:8px;padding:1px 3px;}
  .day-num{font-size:10px;}
  .container{padding:14px 10px 80px;}
  .header-text p{display:none;}
}
</style>
</head>
<body>
<header>
  <div class="logo-badge">MBR</div>
  <div class="header-text">
    <h1>Shipping Schedule</h1>
    <p>Katy yard arrivals &mdash; H3 &amp; H4 (ship date +4 days transit)</p>
  </div>
  <a class="back-btn" href="/home">&#8592; Home</a>
</header>

<div class="container">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot ld-h3"></div> Horizon 3</div>
    <div class="legend-item"><div class="legend-dot ld-h4"></div> Horizon 4</div>
    <div class="legend-item"><div class="legend-dot ld-shipped"></div> Already Arrived</div>
    <div class="legend-item" style="color:#94a3b8;font-size:10px;">&#9632;&#9472;&#9472;&#9632; = transit window</div>
  </div>

  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
    <button class="notify-btn" onclick="notifyLeads()">&#128276; Notify Leads</button>
    <span id="notifyMsg"></span>
  </div>

  <div class="month-nav">
    <button class="nav-btn" onclick="prevMonth()">&#8249;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="nextMonth()">&#8250;</button>
  </div>

  <div class="cal-grid">
    <div class="cal-days-hdr">
      <div class="cal-day-hdr">Sun</div>
      <div class="cal-day-hdr">Mon</div>
      <div class="cal-day-hdr">Tue</div>
      <div class="cal-day-hdr">Wed</div>
      <div class="cal-day-hdr">Thu</div>
      <div class="cal-day-hdr">Fri</div>
      <div class="cal-day-hdr">Sat</div>
    </div>
    <div class="cal-cells" id="calCells"></div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-date" id="detailDate"></div>
    <div id="detailItems"></div>
  </div>

  <div class="section-label">Upcoming Arrivals &mdash; Katy Yard</div>
  <div id="upcomingList"></div>
</div>

<script>
var SHIPMENTS=[
  {ship:'2026-07-10',date:'2026-07-14',project:'H3',name:'Core Building UPSO SWBDs',po:'14195',units:'Shipment 2 — 1 unit',status:'shipped'},
  {ship:'2026-07-10',date:'2026-07-14',project:'H4',name:'LVS/UPSO SWBDs',po:'14102',units:'Shipment 1 — Units 1, 2',status:'shipped'},
  {ship:'2026-07-17',date:'2026-07-21',project:'H4',name:'LVS/UPSO SWBDs',po:'14102',units:'Units 3, 4, 5',status:'upcoming'},
  {ship:'2026-07-24',date:'2026-07-28',project:'H4',name:'LVS/UPSO SWBDs',po:'14102',units:'Shipment 2 — Units 6-9',status:'upcoming'},
  {ship:'2026-07-31',date:'2026-08-04',project:'H4',name:'LVS/UPSO SWBDs',po:'14102',units:'Shipment 3 — Units 10-13',status:'upcoming'},
  {ship:'2026-08-07',date:'2026-08-11',project:'H4',name:'LVS/UPSO SWBDs',po:'14102',units:'Shipment 4 — Units 14-17',status:'upcoming'},
  {ship:'2026-08-14',date:'2026-08-18',project:'H4',name:'LVS/UPSO SWBDs',po:'14102',units:'Shipment 5 — Units 18-21',status:'upcoming'},
  {ship:'2026-08-21',date:'2026-08-25',project:'H4',name:'LVS/UPSO SWBDs',po:'14102',units:'Shipment 6 — Units 22-24',status:'upcoming'},
  {ship:'2026-08-28',date:'2026-09-01',project:'H4',name:'Core Building UPSO SWBDs',po:'14196',units:'Shipment 1 — 2 units',status:'upcoming'}
];

var today=new Date();
var curYear=2026,curMonth=6;
var MNAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
var SMONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function dk(y,m,d){return y+'-'+(m+1<10?'0':'')+(m+1)+'-'+(d<10?'0':'')+d;}
function pd(s){return new Date(s+'T12:00:00');}

function buildRangeMap(){
  var map={};
  SHIPMENTS.forEach(function(ev){
    var cc=ev.status==='shipped'?'seg-shipped':(ev.project==='H3'?'seg-h3':'seg-h4');
    var cur=pd(ev.ship),arr=pd(ev.date);
    while(cur<=arr){
      var key=cur.toISOString().slice(0,10);
      var isS=(key===ev.ship),isA=(key===ev.date);
      var role=isS&&isA?'single':isS?'start':isA?'end':'mid';
      var dow=cur.getDay();
      var sc=role==='single'?'seg-single':role==='start'?(dow===6?'seg-mid':'seg-start'):role==='end'?(dow===0?'seg-mid':'seg-end'):'seg-mid';
      if(!map[key])map[key]=[];
      map[key].push({ev:ev,role:role,sc:sc,cc:cc});
      cur.setDate(cur.getDate()+1);
    }
  });
  return map;
}

function renderCalendar(){
  document.getElementById('monthLabel').textContent=MNAMES[curMonth]+' '+curYear;
  var fd=new Date(curYear,curMonth,1).getDay();
  var dim=new Date(curYear,curMonth+1,0).getDate();
  var ts=today.toISOString().slice(0,10);
  var rm=buildRangeMap();
  var cells=document.getElementById('calCells');
  cells.innerHTML='';
  for(var i=0;i<fd;i++){var e=document.createElement('div');e.className='cal-cell empty';cells.appendChild(e);}
  for(var d=1;d<=dim;d++){
    var key=dk(curYear,curMonth,d);
    var ranges=rm[key]||[];
    var pills=ranges.filter(function(r){return r.role==='start'||r.role==='single'||r.role==='end';});
    var cell=document.createElement('div');
    cell.className='cal-cell'+(ranges.length?' has-event':'')+(key===ts?' today':'');
    cell.dataset.date=key;
    if(ranges.length)cell.onclick=function(){openDetail(this.dataset.date);};
    var num=document.createElement('div');num.className='day-num';num.textContent=d;cell.appendChild(num);
    pills.forEach(function(r){
      var pill=document.createElement('div');
      var pc=r.ev.status==='shipped'?'pill-shipped':(r.ev.project==='H3'?'pill-h3':'pill-h4');
      pill.className='event-pill '+pc;
      var em=r.role==='start'?'📦 ':(r.role==='end'?'🎯 ':'');
      pill.textContent=em+(r.ev.project==='H3'?'H3':'H4')+' '+(r.role==='end'?'Arrives':'Ships');
      cell.appendChild(pill);
    });
    ranges.forEach(function(r,i){
      var seg=document.createElement('div');
      seg.className='range-seg '+r.sc+' '+r.cc;
      seg.style.bottom=(i*6)+'px';
      cell.appendChild(seg);
    });
    cells.appendChild(cell);
  }
  document.getElementById('detailPanel').classList.remove('open');
}

function openDetail(dateStr){
  var rm=buildRangeMap();
  var ranges=rm[dateStr];
  if(!ranges||!ranges.length)return;
  var d=pd(dateStr);
  document.getElementById('detailDate').textContent=
    d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  var seen={},html='';
  ranges.forEach(function(r){
    var k=r.ev.ship+r.ev.project+r.ev.po;
    if(seen[k])return;seen[k]=1;
    var ev=r.ev;
    var bc=ev.status==='shipped'?'shipped':(ev.project==='H3'?'h3':'');
    var bdc=ev.status==='shipped'?'status-shipped':(r.role==='end'?'status-thisweek':'status-upcoming');
    var bdt=ev.status==='shipped'?'Arrived':(r.role==='end'?'Arrives Today':(r.role==='start'?'Departs Today':'In Transit'));
    html+='<div class="detail-item '+bc+'">'
      +'<div class="detail-project">'+ev.project+' &mdash; PO '+ev.po+'</div>'
      +'<div class="detail-name">'+ev.name+'</div>'
      +'<div class="detail-meta">'+ev.units+' &middot; Katy, TX</div>'
      +'<div class="detail-range">📦 Ships: '+ev.ship+' &nbsp;&rarr;&nbsp; 🎯 Arrives: '+ev.date+'</div>'
      +'<span class="detail-status '+bdc+'">'+bdt+'</span>'
      +'</div>';
  });
  document.getElementById('detailItems').innerHTML=html;
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('detailPanel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function prevMonth(){curMonth--;if(curMonth<0){curMonth=11;curYear--;}renderCalendar();}
function nextMonth(){curMonth++;if(curMonth>11){curMonth=0;curYear++;}renderCalendar();}

function renderUpcoming(){
  var t0=new Date(today.getFullYear(),today.getMonth(),today.getDate()).getTime();
  var fut=SHIPMENTS.filter(function(s){return pd(s.date).getTime()>=t0;})
    .sort(function(a,b){return a.date.localeCompare(b.date);});
  var html='';
  if(!fut.length){html='<div style="color:#94a3b8;font-size:13px;padding:8px 0;">No upcoming deliveries.</div>';}
  fut.forEach(function(ev){
    var dt=pd(ev.date);
    var diff=Math.round((dt.getTime()-t0)/(86400000));
    var bc=ev.status==='shipped'?'status-shipped':(diff<=7?'status-thisweek':'status-upcoming');
    var bt=ev.status==='shipped'?'Arrived':(diff===0?'Today':(diff<=7?'This Week':diff+'d'));
    var pc=ev.project==='H3'?'#a855f7':'#2563eb';
    html+='<div class="upcoming-item">'
      +'<div class="upcoming-date-box"><div class="udb-month">'+SMONS[dt.getMonth()]+'</div>'
      +'<div class="udb-day" style="color:'+pc+'">'+dt.getDate()+'</div></div>'
      +'<div class="upcoming-info">'
        +'<div class="upcoming-project">'+ev.project+' &mdash; PO '+ev.po+' &middot; Katy, TX</div>'
        +'<div class="upcoming-name">'+ev.name+'</div>'
        +'<div class="upcoming-units">'+ev.units+'</div>'
        +'<div class="upcoming-range">📦 '+ev.ship+' &rarr; 🎯 '+ev.date+'</div>'
      +'</div>'
      +'<span class="upcoming-badge '+bc+'">'+bt+'</span>'
      +'</div>';
  });
  document.getElementById('upcomingList').innerHTML=html;
}

function notifyLeads(){
  var btn=document.querySelector('.notify-btn');
  var msg=document.getElementById('notifyMsg');
  btn.disabled=true;btn.textContent='Sending...';
  var t0=new Date(today.getFullYear(),today.getMonth(),today.getDate()).getTime();
  var ups=SHIPMENTS.filter(function(s){return pd(s.date).getTime()>=t0&&s.status!=='shipped';});
  Promise.all(ups.map(function(ev){
    var diff=Math.round((pd(ev.date).getTime()-t0)/86400000);
    var when=diff===0?'Today':diff===1?'Tomorrow':'In '+diff+' days';
    return fetch('/api/notifications',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({title:'📦 '+ev.project+' Arrives '+when+' — Katy Yard',
        body:ev.name+' | '+ev.units+' | Ships: '+ev.ship+' → Arrives: '+ev.date,
        target:'supervisor',created_by:'Schedule'})});
  })).then(function(){
    btn.disabled=false;btn.innerHTML='&#128276; Notify Leads';
    msg.style.display='inline';msg.textContent=ups.length+' notifications sent.';
    setTimeout(function(){msg.style.display='none';},4000);
  }).catch(function(){
    btn.disabled=false;btn.innerHTML='&#128276; Notify Leads';
    msg.style.color='#dc2626';msg.style.display='inline';msg.textContent='Error sending.';
  });
}

renderCalendar();
renderUpcoming();
</script>
</body>
</html>
