<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipping Schedule — MBR Texas</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#060c18;color:#e2e8f0;min-height:100vh;}
header{background:#0d1a2d;border-bottom:1px solid #1a2535;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.back-btn{background:#1a2535;border:1px solid #2d3f57;border-radius:8px;color:#94a3b8;padding:6px 12px;font-size:12px;cursor:pointer;text-decoration:none;}
.page-title{font-size:16px;font-weight:700;color:#e2e8f0;}
.page-sub{font-size:11px;color:#64748b;margin-top:1px;}

.container{max-width:720px;margin:0 auto;padding:16px;}

/* Month nav */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.month-label{font-size:18px;font-weight:700;color:#e2e8f0;}
.nav-btn{background:#1a2535;border:1px solid #2d3f57;border-radius:8px;color:#94a3b8;width:34px;height:34px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{border-color:#38bdf8;color:#38bdf8;}

/* Calendar grid */
.cal-grid{background:#0d1a2d;border:1px solid #1a2535;border-radius:14px;overflow:hidden;}
.cal-days-hdr{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #1a2535;}
.cal-day-hdr{text-align:center;padding:8px 0;font-size:10px;font-weight:700;color:#475569;letter-spacing:.6px;text-transform:uppercase;}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:72px;padding:6px 4px;border-right:1px solid #111a28;border-bottom:1px solid #111a28;position:relative;cursor:default;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.empty{background:#080e1a;}
.cal-cell.today .day-num{background:#38bdf8;color:#000;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:800;}
.day-num{font-size:11px;color:#475569;font-weight:600;margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-cell.has-event .day-num{color:#e2e8f0;}

/* Event pills */
.event-pill{font-size:9px;font-weight:700;border-radius:4px;padding:2px 5px;margin-bottom:2px;line-height:1.3;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pill-h3{background:rgba(168,85,247,.25);color:#c084fc;border:1px solid rgba(168,85,247,.3);}
.pill-h4{background:rgba(56,189,248,.2);color:#38bdf8;border:1px solid rgba(56,189,248,.25);}
.pill-shipped{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.2);}

/* Legend */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8;}
.legend-dot{width:10px;height:10px;border-radius:3px;}
.ld-h3{background:rgba(168,85,247,.4);border:1px solid #c084fc;}
.ld-h4{background:rgba(56,189,248,.3);border:1px solid #38bdf8;}
.ld-shipped{background:rgba(34,197,94,.25);border:1px solid #4ade80;}

/* Detail panel */
.detail-panel{background:#0d1a2d;border:1px solid #1a2535;border-radius:12px;padding:14px;margin-top:14px;display:none;}
.detail-panel.open{display:block;}
.detail-date{font-size:13px;font-weight:700;color:#38bdf8;margin-bottom:10px;}
.detail-item{background:#111f35;border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid #38bdf8;}
.detail-item.h3{border-left-color:#c084fc;}
.detail-item.shipped{border-left-color:#4ade80;}
.detail-project{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.detail-name{font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:3px;}
.detail-meta{font-size:11px;color:#64748b;}
.detail-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;display:inline-block;margin-top:4px;}
.status-shipped{background:rgba(34,197,94,.15);color:#4ade80;}
.status-upcoming{background:rgba(56,189,248,.15);color:#38bdf8;}
.status-thisweek{background:rgba(251,191,36,.15);color:#fbbf24;}

/* Upcoming list */
.section-label{font-size:10px;font-weight:700;color:#475569;letter-spacing:.7px;text-transform:uppercase;margin:20px 0 8px;}
.upcoming-item{background:#0d1a2d;border:1px solid #1a2535;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.upcoming-date-box{background:#111f35;border-radius:8px;padding:6px 10px;text-align:center;min-width:52px;flex-shrink:0;}
.udb-month{font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;}
.udb-day{font-size:20px;font-weight:800;color:#38bdf8;line-height:1;}
.upcoming-info{flex:1;}
.upcoming-project{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.4px;}
.upcoming-name{font-size:13px;font-weight:700;color:#e2e8f0;margin:2px 0;}
.upcoming-units{font-size:11px;color:#64748b;}
.upcoming-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;}

@media(max-width:480px){
  .cal-cell{min-height:54px;padding:4px 2px;}
  .event-pill{font-size:8px;padding:1px 3px;}
  .day-num{font-size:10px;}
}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="/home">← Home</a>
  <div>
    <div class="page-title">📅 Shipping Schedule</div>
    <div class="page-sub">Katy yard deliveries — Horizon 3 &amp; Horizon 4</div>
  </div>
</header>

<div class="container">

  <div class="legend">
    <div class="legend-item"><div class="legend-dot ld-h3"></div> Horizon 3</div>
    <div class="legend-item"><div class="legend-dot ld-h4"></div> Horizon 4</div>
    <div class="legend-item"><div class="legend-dot ld-shipped"></div> Already Shipped</div>
  </div>

  <div class="month-nav">
    <button class="nav-btn" onclick="prevMonth()">&#8249;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="nextMonth()">&#8250;</button>
  </div>

  <div class="cal-grid">
    <div class="cal-days-hdr">
      <div class="cal-day-hdr">Sun</div>
      <div class="cal-day-hdr">Mon</div>
      <div class="cal-day-hdr">Tue</div>
      <div class="cal-day-hdr">Wed</div>
      <div class="cal-day-hdr">Thu</div>
      <div class="cal-day-hdr">Fri</div>
      <div class="cal-day-hdr">Sat</div>
    </div>
    <div class="cal-cells" id="calCells"></div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-date" id="detailDate"></div>
    <div id="detailItems"></div>
  </div>

  <div class="section-label">Upcoming Deliveries — Katy Yard</div>
  <div id="upcomingList"></div>

</div>

<script>
// ── All Katy shipments ────────────────────────────────────────────────────────
var SHIPMENTS = [
  // Horizon THREE
  {date:'2026-07-10', project:'H3', name:'Core Building UPSO SWBDs', po:'14195', units:'Shipment 2 — 1 unit', status:'upcoming'},

  // Horizon FOUR
  {date:'2026-07-10', project:'H4', name:'LVS/UPSO SWBDs', po:'14102', units:'Shipment 1 — Units 1, 2', status:'shipped'},
  {date:'2026-07-17', project:'H4', name:'LVS/UPSO SWBDs', po:'14102', units:'Units 3, 4, 5', status:'upcoming'},
  {date:'2026-07-24', project:'H4', name:'LVS/UPSO SWBDs', po:'14102', units:'Shipment 2 — Units 6, 7, 8, 9', status:'upcoming'},
  {date:'2026-07-31', project:'H4', name:'LVS/UPSO SWBDs', po:'14102', units:'Shipment 3 — Units 10, 11, 12, 13', status:'upcoming'},
  {date:'2026-08-07', project:'H4', name:'LVS/UPSO SWBDs', po:'14102', units:'Shipment 4 — Units 14, 15, 16, 17', status:'upcoming'},
  {date:'2026-08-14', project:'H4', name:'LVS/UPSO SWBDs', po:'14102', units:'Shipment 5 — Units 18, 19, 20, 21', status:'upcoming'},
  {date:'2026-08-21', project:'H4', name:'LVS/UPSO SWBDs', po:'14102', units:'Shipment 6 — Units 22, 23, 24', status:'upcoming'},
  {date:'2026-08-28', project:'H4', name:'Core Building UPSO SWBDs', po:'14196', units:'Shipment 1 — 2 units', status:'upcoming'},
];

var today = new Date();
var curYear = 2026;
var curMonth = 6; // 0-indexed: 6 = July
var selectedDate = null;

var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function getEventsForDate(dateStr){
  return SHIPMENTS.filter(function(s){return s.date===dateStr;});
}

function getEventsForMonth(year, month){
  var prefix = year+'-'+(month+1<10?'0':'')+(month+1);
  return SHIPMENTS.filter(function(s){return s.date.startsWith(prefix);});
}

function dateKey(year, month, day){
  return year+'-'+(month+1<10?'0':'')+(month+1)+'-'+(day<10?'0':'')+day;
}

function renderCalendar(){
  document.getElementById('monthLabel').textContent = MONTH_NAMES[curMonth] + ' ' + curYear;
  var firstDay = new Date(curYear, curMonth, 1).getDay(); // 0=Sun
  var daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  var cells = document.getElementById('calCells');
  cells.innerHTML = '';

  // Empty cells before first day
  for(var i=0;i<firstDay;i++){
    var empty=document.createElement('div');
    empty.className='cal-cell empty';
    cells.appendChild(empty);
  }

  var todayStr = today.getFullYear()+'-'+(today.getMonth()+1<10?'0':'')+(today.getMonth()+1)+'-'+(today.getDate()<10?'0':'')+today.getDate();

  for(var d=1;d<=daysInMonth;d++){
    var dk=dateKey(curYear,curMonth,d);
    var evs=getEventsForDate(dk);
    var cell=document.createElement('div');
    cell.className='cal-cell'+(evs.length?' has-event':'')+(dk===todayStr?' today':'');
    cell.dataset.date=dk;
    if(evs.length) cell.onclick=function(){openDetail(this.dataset.date);};

    var num=document.createElement('div');
    num.className='day-num';
    num.textContent=d;
    cell.appendChild(num);

    evs.forEach(function(ev){
      var pill=document.createElement('div');
      var cls = ev.status==='shipped'?'pill-shipped':(ev.project==='H3'?'pill-h3':'pill-h4');
      pill.className='event-pill '+cls;
      pill.textContent=(ev.project==='H3'?'H3':'H4')+' '+ev.name.replace('SWBDs','').replace('Building','Bldg').trim();
      cell.appendChild(pill);
    });

    cells.appendChild(cell);
  }

  // Close detail if month changed
  document.getElementById('detailPanel').classList.remove('open');
  selectedDate=null;
}

function openDetail(dateStr){
  var evs=getEventsForDate(dateStr);
  if(!evs.length) return;
  var panel=document.getElementById('detailPanel');
  var d=new Date(dateStr+'T12:00:00');
  document.getElementById('detailDate').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  var html='';
  evs.forEach(function(ev){
    var borderCls=ev.status==='shipped'?'shipped':(ev.project==='H3'?'h3':'');
    var badgeCls=ev.status==='shipped'?'status-shipped':'status-upcoming';
    var badgeTxt=ev.status==='shipped'?'Already Shipped':'Incoming';
    html+='<div class="detail-item '+borderCls+'">'
      +'<div class="detail-project">'+ev.project+' &mdash; PO '+ev.po+'</div>'
      +'<div class="detail-name">'+ev.name+'</div>'
      +'<div class="detail-meta">'+ev.units+' &middot; Delivery: Katy, TX</div>'
      +'<span class="detail-status '+badgeCls+'">'+badgeTxt+'</span>'
      +'</div>';
  });
  document.getElementById('detailItems').innerHTML=html;
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function prevMonth(){
  curMonth--;
  if(curMonth<0){curMonth=11;curYear--;}
  renderCalendar();
}
function nextMonth(){
  curMonth++;
  if(curMonth>11){curMonth=0;curYear++;}
  renderCalendar();
}

// Upcoming list (all future + this week)
function renderUpcoming(){
  var todayMs=new Date(today.getFullYear(),today.getMonth(),today.getDate()).getTime();
  var future=SHIPMENTS.filter(function(s){
    var dt=new Date(s.date+'T12:00:00');
    return dt.getTime()>=todayMs;
  }).sort(function(a,b){return a.date.localeCompare(b.date);});

  var html='';
  if(!future.length){html='<div style="color:#475569;font-size:13px;padding:12px 0;">No upcoming deliveries scheduled.</div>';}
  future.forEach(function(ev){
    var dt=new Date(ev.date+'T12:00:00');
    var diffDays=Math.round((dt.getTime()-todayMs)/(1000*60*60*24));
    var badgeCls=ev.status==='shipped'?'status-shipped':(diffDays<=7?'status-thisweek':'status-upcoming');
    var badgeTxt=ev.status==='shipped'?'Already Shipped':(diffDays===0?'Today':(diffDays<=7?'This Week':diffDays+' days'));
    var projColor=ev.project==='H3'?'#c084fc':'#38bdf8';
    html+='<div class="upcoming-item">'
      +'<div class="upcoming-date-box"><div class="udb-month">'+SHORT_MONTHS[dt.getMonth()]+'</div><div class="udb-day" style="color:'+projColor+'">'+dt.getDate()+'</div></div>'
      +'<div class="upcoming-info">'
        +'<div class="upcoming-project">'+ev.project+' &mdash; PO '+ev.po+' &middot; Katy, TX</div>'
        +'<div class="upcoming-name">'+ev.name+'</div>'
        +'<div class="upcoming-units">'+ev.units+'</div>'
      +'</div>'
      +'<span class="upcoming-badge '+badgeCls+'">'+badgeTxt+'</span>'
      +'</div>';
  });
  document.getElementById('upcomingList').innerHTML=html;
}

renderCalendar();
renderUpcoming();
</script>
</body>
</html>
