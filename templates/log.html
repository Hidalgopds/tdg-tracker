<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TDG — Daily Update</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f1923; color: #e8edf2;
  display: flex; flex-direction: column;
}

/* ── Top bar ── */
.top-bar {
  background: #162030;
  border-bottom: 2px solid #1e2d3d;
  padding: 8px 12px;
  flex-shrink: 0;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}

.logo {
  width: 32px; height: 32px; background: #1a6bc4; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 11px; color: white; flex-shrink: 0;
}

.ctrl-group { display: flex; align-items: center; gap: 5px; }

.ctrl-label {
  font-size: 9px; font-weight: 700; color: #6b7f94;
  text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap;
}

select.ctrl, input.ctrl {
  background: #0f1923; border: 1px solid #2a3d52;
  border-radius: 6px; color: #e8edf2;
  font-size: 13px; padding: 5px 8px;
  outline: none; -webkit-appearance: none; height: 32px;
}
select.ctrl:focus, input.ctrl:focus { border-color: #1a6bc4; }

.period-row { display: flex; gap: 3px; }
.period-btn {
  height: 32px; padding: 0 12px;
  border: 1px solid #2a3d52; border-radius: 6px;
  background: #0f1923; color: #6b7f94;
  font-size: 12px; font-weight: 700; cursor: pointer;
}
.period-btn.active { background: #1a3a5c; border-color: #1a6bc4; color: #4da3ff; }

/* Skid checkbox group */
.skid-group {
  display: flex; align-items: center; gap: 6px;
  background: #0f1923; border: 1px solid #2a3d52;
  border-radius: 6px; padding: 4px 10px; height: 32px;
}
.skid-group label { font-size: 12px; color: #8fa3b5; cursor: pointer; white-space: nowrap; }
.skid-group input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: #1a6bc4; }
#skidRefWrap { display: none; }
#skidRef {
  background: #0f1923; border: 1px solid #1a6bc4;
  border-radius: 5px; color: #4da3ff;
  font-size: 12px; padding: 3px 8px; outline: none;
  width: 80px; height: 28px;
}

.divider { width: 1px; height: 24px; background: #1e2d3d; flex-shrink: 0; }

.submit-btn {
  margin-left: auto; height: 32px; padding: 0 18px;
  background: #1a6bc4; border: none; border-radius: 7px;
  color: white; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}
.submit-btn:active { background: #1558a0; }
.submit-btn:disabled { background: #1e2d3d; color: #4a5568; cursor: not-allowed; }

/* ── Table ── */
.table-wrap {
  flex: 1; overflow-y: auto; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  position: relative;
}

table {
  width: 100%; min-width: 600px;
  border-collapse: collapse; table-layout: fixed;
}

col.c-trade { width: 200px; }
col.c-prev  { width: 68px; }
col.c-pct   { width: 72px; }
col.c-resp  { width: 130px; }
col.c-notes { min-width: 160px; }

/* Frozen header */
thead th {
  background: #0d1520; color: #4a6380;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  padding: 8px 7px; border-bottom: 2px solid #1e2d3d;
  white-space: nowrap; text-align: left;
  position: sticky; top: 0; z-index: 20;
}
thead th:first-child { position: sticky; left: 0; top: 0; z-index: 30; background: #0d1520; }

/* Prev % column header — distinct color */
th.h-prev { background: #0a1e30; color: #2a6a9a; text-align: center; }

/* Category rows */
tr.cat-row td {
  background: #111d2b; color: #1a6bc4;
  font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px;
  padding: 6px 10px;
  border-top: 2px solid #1e2d3d; border-bottom: 1px solid #1e2d3d;
}
tr.cat-row td:first-child { position: sticky; left: 0; z-index: 5; background: #111d2b; }

/* Trade rows */
tr.trade-row td {
  padding: 3px 5px; border-bottom: 1px solid #131f2d;
  vertical-align: middle; background: #0f1923;
}
tr.trade-row:hover td { background: #132030; }
tr.trade-row td:first-child {
  position: sticky; left: 0; z-index: 4; background: #0f1923;
  font-size: 12px; color: #8fa3b5;
  padding-left: 18px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
tr.trade-row:hover td:first-child { background: #132030; }
tr.trade-row.has-data td             { background: #0e1d2e; }
tr.trade-row.has-data td:first-child { background: #0e1d2e; color: #e8edf2; }

/* Prev % cell — always distinct background */
td.prev-cell {
  background: #091520 !important;
  text-align: center;
  font-size: 13px; font-weight: 600;
  color: #2e6a9a;
  border-left: 2px solid #0d2235;
  border-right: 2px solid #0d2235;
}
td.prev-cell.has-val { color: #4da3ff; }

/* Inputs */
input.t-pct {
  width: 58px; background: #0a1420; border: 1px solid #1e2d3d;
  border-radius: 5px; color: #e8edf2;
  font-size: 13px; font-weight: 600;
  padding: 4px 5px; text-align: center; outline: none;
}
input.t-pct:focus { border-color: #1a6bc4; }

input.t-text {
  width: 100%; background: #0a1420; border: 1px solid #1e2d3d;
  border-radius: 5px; color: #e8edf2;
  font-size: 12px; padding: 4px 7px;
  outline: none; height: 28px;
}
input.t-text:focus { border-color: #1a6bc4; }

/* Status */
.status-bar {
  flex-shrink: 0; text-align: center; padding: 7px 16px;
  font-size: 11px; color: #3d5470;
  border-top: 1px solid #131f2d; background: #0f1923;
}

/* Toast */
.toast {
  display: none; position: fixed; top: 68px; left: 50%;
  transform: translateX(-50%);
  background: #16a34a; color: white;
  padding: 10px 22px; border-radius: 100px;
  font-size: 13px; font-weight: 700; z-index: 999;
  white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.toast.error { background: #dc2626; }
</style>

<style id="gnav-style">
.gnav{position:fixed;bottom:0;left:0;right:0;height:54px;background:#060c18;border-top:1px solid #1a2535;display:flex;justify-content:space-around;align-items:center;z-index:9999;box-shadow:0 -4px 24px rgba(0,0,0,.5);}
.gnav a{display:flex;flex-direction:column;align-items:center;gap:1px;text-decoration:none;color:#475569;padding:0 8px;font-size:10px;font-weight:500;transition:.15s;min-width:44px;}
.gnav a:hover,.gnav a.gna{color:#a855f7;}
.gnav a .gi{font-size:19px;line-height:1.2;}
body{padding-bottom:60px !important;}
</style>

<body>
<div id="log-nav-bar" style="position:sticky;top:0;z-index:200;background:#1e3a5f;border-bottom:1px solid #0f2d52;display:flex;align-items:center;padding:0 16px;height:42px;gap:12px;">
  <a href="/home" style="color:#93c5fd;text-decoration:none;font-size:13px;white-space:nowrap;">← Home</a>
  <span style="color:#334155;">|</span>
  <span style="font-size:14px;font-weight:700;color:#e2e8f0;">📋 Daily Field Log</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
    <div id="mbr-checkin-chip" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;background:rgba(100,116,139,0.15);color:#94a3b8;border:1px solid rgba(100,116,139,0.2);cursor:default;white-space:nowrap;">
      <span id="chip-dot" style="width:6px;height:6px;border-radius:50%;background:#64748b;display:inline-block;"></span>
      <span id="chip-label" style="display:none;"></span>
    </div>
    <button onclick="localStorage.removeItem('mbrAuth');localStorage.removeItem('mbrRole');location.href='/login';" style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">✕</button>
  </div>
</div>
<script>
(function(){
  var n=localStorage.getItem('mbrAuth')||'';
  var r=localStorage.getItem('mbrRole')||'';
  var el=document.getElementById('log-user-pill');
  if(el&&n){var cap=r?r.charAt(0).toUpperCase()+r.slice(1):'';el.textContent=n+(cap?' · '+cap:'');}
  if(!n)return;
  function _upd(){
    fetch('/api/contractor/status?name='+encodeURIComponent(n))
      .then(function(r){return r.json();})
      .then(function(d){
        var bc=document.getElementById('mbr-checkin-chip');
        var bd=document.getElementById('chip-dot');
        var bl=document.getElementById('chip-label');
        if(!bc||!bd||!bl)return;
        if(d.checked_in){
          bc.style.background='rgba(34,197,94,0.15)';bc.style.color='#16a34a';bc.style.border='1px solid rgba(34,197,94,0.3)';
          bd.style.background='#22c55e';
          bl.textContent=d.since?'Checked In · '+d.since:'Checked In';
        }else{
          bc.style.background='rgba(100,116,139,0.15)';bc.style.color='#94a3b8';bc.style.border='1px solid rgba(100,116,139,0.2)';
          bd.style.background='#64748b';
          bl.textContent='Not Checked In';
        }
      }).catch(function(){setTimeout(_upd,5000);});
  }
  _upd();
  setInterval(_upd,60000);
})();
</script>

<script>
(function(){
  var role = localStorage.getItem('mbrRole') || '';
  var name = localStorage.getItem('mbrAuth') || '';
  var lvl  = {admin:5,boss:4,inventory:3,lead:2,worker:1}[role] || 0;
  if(!name || lvl < 2) { location.href='/home'; }
})();
</script>
